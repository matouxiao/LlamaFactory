### model（与 qwen2_5_omni_lora_sft.yaml 一致，使用本地权重目录）
model_name_or_path: /mnt/workspace/xjz/models/qwen2_5_omni
trust_remote_code: true
# FlashAttention-2：需 pip install flash-attn；装不上可改为 sdpa
flash_attn: fa2

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 8
lora_target: all
deepspeed: examples/deepspeed/ds_z3_config.json

### dataset
# 使用含 <audio> 占位符的数据（见 correct_modelcorrect_model.omni.jsonl）
dataset: correct_model
dataset_dir: ./data
media_dir: /mnt/workspace/xjz/Audios_Datasets/WenetSpeech/DATA_UNTAR_DIRECTORY
template: qwen2_omni
cutoff_len: 8192
overwrite_cache: true
preprocessing_num_workers: 16
dataloader_num_workers: 4

### output
output_dir: saves/qwen2_5_omni-7b/lora/sft_ds3
logging_steps: 10
save_steps: 1000
plot_loss: true
overwrite_output_dir: true
save_only_model: false
report_to: none

### train
per_device_train_batch_size: 1
gradient_accumulation_steps: 8
learning_rate: 1.0e-4
num_train_epochs: 1.0
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
resume_from_checkpoint: null

### eval
# val_size: 0.02
