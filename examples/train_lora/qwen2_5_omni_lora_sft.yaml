### model（音频+文本 ASR 纠错 SFT；数据集见 data/dataset_info.json → correct_model）
# 多卡设备：用环境变量指定物理 GPU，例如仅用 4–7 四张卡：
#   CUDA_VISIBLE_DEVICES=4,5,6,7 llamafactory-cli train examples/train_lora/qwen2_5_omni_lora_sft.yaml
# 或：bash examples/train_lora/qwen2_5_omni_lora_sft.sh（脚本内默认 CUDA_VISIBLE_DEVICES=4,5,6,7）
# 本地微调：须与磁盘路径完全一致（Linux 区分大小写）；错路径会被当成 Hub repo id 并报 HFValidationError
model_name_or_path: /mnt/workspace/xjz/models/qwen2_5_omni
trust_remote_code: true
# FlashAttention-2：需 pip install flash-attn；装不上或报错可改为 sdpa（PyTorch SDPA）
flash_attn: fa2

### method
stage: sft
do_train: true
finetuning_type: lora
lora_rank: 128
lora_alpha: 256
use_dora: true
lora_target: q_proj,v_proj,k_proj,o_proj,gate_proj,up_proj,down_proj

### dataset
# 数据须在 user 侧文本中含与音频条数一致的 <audio> 占位（默认在 prompt 首行，见 make_data/add_audio_placeholder_jsonl.py）
dataset: correct_model_reading
# 须指向含 dataset_info.json 的目录；用相对路径时请先 cd 到 LlamaFactory 仓库根目录再启动训练
dataset_dir: /mnt/workspace/xjz/LlamaFactory/data
# jsonl 中 audio 为相对路径（如 audio/train/...），此处填「含 audio/ 目录」的磁盘根路径
media_dir: /mnt/workspace/xjz/Audios_Datasets/WenetSpeech/DATA_UNTAR_DIRECTORY
template: qwen2_omni
cutoff_len: 8192
# max_samples: 100  # 仅调试时取消注释，全量训练不要设
overwrite_cache: false
# 多卡+CUDA 已初始化后，num_proc>1 的 map 易死锁/长期 0%；先保持 1；缓存生成后可再改小测试
preprocessing_num_workers: 16
# 默认 1000：qwen2_omni 在 expand_mm_tokens 下每条要读音频并跑 feature_extractor，一批=1000 会极慢且进度条在完成该批前一直 0%
preprocessing_batch_size: 200
dataloader_num_workers: 64

### output
output_dir: /mnt/workspace/xjz/models/qwen2_5_omni-7b/lora/sft_dora
logging_steps: 10
# 每轮结束保存：save_strategy=epoch（HF 无 save_epochs 字段，勿写）
# 每 0.5 个 epoch 存一次：改为 save_strategy: steps，save_steps ≈ steps_per_epoch/2
# 当前约 49000 训练样本、4 卡、per_device×accum×卡=32 → 约 1532 步/epoch → 半轮≈766（若改 batch/卡数请重算）
save_strategy: steps
save_steps: 766
plot_loss: true
# 从头训练用 true 会覆盖同目录旧 checkpoint；续训时改为 false 并设 resume_from_checkpoint
overwrite_output_dir: true
save_only_model: false
# 与 use_swanlab 不要同时用 report_to: swanlab：HF 内置 SwanLab 会忽略下方 swanlab_project，项目名常变成当前目录名（如 llamafactory）
report_to: none  # choices: [none, wandb, tensorboard, swanlab, mlflow]
use_swanlab: true
swanlab_api_key: cVNLlDt9PJNe6I9nkSv9W
swanlab_project: correct_model_reading

### train
# 约 63/97GB 有余量时可试 2+4 累积：等效 batch=2×4卡×4=32（与原 1×4×8 相同）；OOM 则改回 1+8
per_device_train_batch_size: 2
gradient_accumulation_steps: 4
learning_rate: 1.0e-4
num_train_epochs: 5
lr_scheduler_type: cosine
warmup_ratio: 0.05
bf16: true
ddp_timeout: 180000000
# 从头训练：保持 null；续训时改为 checkpoint 目录路径
resume_from_checkpoint: null
### eval（从训练集划出验证子集；不需要验证可再全部注释并去掉 val_size）
val_size: 0.02
per_device_eval_batch_size: 1
eval_strategy: steps
eval_steps: 1000
